name: Node.js CI

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm install
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm install
      - run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # node-version: 20

      - run: npm install

      - run: npm run build

      - name: Run Trivy scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/project \
            aquasec/trivy:latest \
            fs /project \
            --severity CRITICAL,HIGH \
            --exit-code 1

      # - name: Upload artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: dist-files-${{ matrix.node-version }}
      #     path: dist

      - name: Upload artifact
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist